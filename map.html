<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LOCATE1 — Position Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }
  svg { flex: 1; width: 100%; }
  #status { padding: 10px 20px; border-top: 1px solid #1a1a1a; color: #444; font-size: 11px; }
  #status.live { color: #0f0; }
</style>
</head>
<body>
<svg id="map"></svg>
<div id="status">connecting...</div>
<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3011' : 'https://locate1.axiemaid.com'
const svg = document.getElementById('map')
const statusEl = document.getElementById('status')

const pairs = {}
const positions = {}

function pubColor(pub) {
  let h = 0
  for (let i = 0; i < 8; i++) h = pub.charCodeAt(i) + ((h << 5) - h)
  return `hsl(${((h % 360) + 360) % 360}, 80%, 60%)`
}

function trimmedMean(vals) {
  if (!vals.length) return null
  if (vals.length < 5) return vals.reduce((a, b) => a + b, 0) / vals.length
  const s = [...vals].sort((a, b) => a - b)
  const t = Math.floor(s.length * 0.1)
  const tr = s.slice(t, s.length - t)
  return tr.reduce((a, b) => a + b, 0) / tr.length
}

function rssiToDist(rssi) {
  return Math.pow(10, (-10 - rssi) / (10 * 2.5))
}

function recompute() {
  const distMap = {}
  const pubSet = new Set()
  for (const key in pairs) {
    const mean = trimmedMean(pairs[key].rssi)
    if (mean === null) continue
    distMap[key] = rssiToDist(mean)
    const [a, b] = key.split('|')
    pubSet.add(a)
    pubSet.add(b)
  }

  const pubs = [...pubSet]
  if (pubs.length < 2) return

  function dist(a, b) {
    const k = [a, b].sort().join('|')
    return distMap[k]
  }

  // Find best triangle
  let bestTri = null, bestScore = -1
  for (let i = 0; i < pubs.length; i++) {
    for (let j = i + 1; j < pubs.length; j++) {
      for (let k = j + 1; k < pubs.length; k++) {
        const dAB = dist(pubs[i], pubs[j])
        const dAC = dist(pubs[i], pubs[k])
        const dBC = dist(pubs[j], pubs[k])
        if (dAB === undefined || dAC === undefined || dBC === undefined) continue
        const kA = [pubs[i], pubs[j]].sort().join('|')
        const kB = [pubs[i], pubs[k]].sort().join('|')
        const kC = [pubs[j], pubs[k]].sort().join('|')
        const score = (pairs[kA]?.rssi.length || 0) + (pairs[kB]?.rssi.length || 0) + (pairs[kC]?.rssi.length || 0)
        if (score > bestScore) {
          bestScore = score
          bestTri = [pubs[i], pubs[j], pubs[k]]
        }
      }
    }
  }

  // Clear positions
  for (const k in positions) delete positions[k]

  if (!bestTri) {
    // Fallback: two nodes
    for (const key in distMap) {
      const [a, b] = key.split('|')
      positions[a] = { x: 0, y: 0, confidence: 1.0 }
      positions[b] = { x: distMap[key], y: 0, confidence: 1.0 }
      break
    }
    return
  }

  const [A, B, C] = bestTri
  const dAB = dist(A, B)
  const dAC = dist(A, C)
  const dBC = dist(B, C)

  positions[A] = { x: 0, y: 0, confidence: 1.0 }
  positions[B] = { x: dAB, y: 0, confidence: 1.0 }

  const cx = (dAC * dAC - dBC * dBC + dAB * dAB) / (2 * dAB)
  const cySquared = dAC * dAC - cx * cx
  let cy, conf
  if (cySquared > 0) {
    cy = Math.sqrt(cySquared)
    conf = 1.0
  } else {
    cy = dAB * 0.01
    conf = 0.1
  }
  positions[C] = { x: cx, y: cy, confidence: conf }

  // Place remaining nodes via gradient descent
  for (const pub of pubs) {
    if (positions[pub]) continue
    const anchors = []
    for (const placed in positions) {
      const d = dist(pub, placed)
      if (d !== undefined) anchors.push({ pub: placed, d })
    }
    if (anchors.length < 2) continue

    let px = 0, py = 0
    for (const a of anchors) { px += positions[a.pub].x; py += positions[a.pub].y }
    px /= anchors.length; py /= anchors.length

    for (let iter = 0; iter < 200; iter++) {
      let gx = 0, gy = 0
      for (const a of anchors) {
        const dx = px - positions[a.pub].x
        const dy = py - positions[a.pub].y
        const curr = Math.sqrt(dx * dx + dy * dy) || 0.001
        const err = curr - a.d
        gx += err * dx / curr
        gy += err * dy / curr
      }
      const lr = 0.1 / (1 + iter * 0.01)
      px -= lr * gx
      py -= lr * gy
    }
    positions[pub] = { x: px, y: py, confidence: 1.0 }
  }
}

function render() {
  const pubs = Object.keys(positions)
  if (!pubs.length) { svg.innerHTML = ''; return }

  const W = svg.clientWidth || window.innerWidth
  const H = svg.clientHeight || (window.innerHeight - 40)
  const pad = 100

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity
  for (const p of pubs) {
    const pos = positions[p]
    if (pos.x < minX) minX = pos.x
    if (pos.x > maxX) maxX = pos.x
    if (pos.y < minY) minY = pos.y
    if (pos.y > maxY) maxY = pos.y
  }

  const rangeX = maxX - minX || 1
  const rangeY = maxY - minY || 1
  const scale = Math.min((W - pad * 2) / rangeX, (H - pad * 2) / rangeY)

  function tx(x) { return pad + (x - minX) * scale + ((W - pad * 2) - rangeX * scale) / 2 }
  function ty(y) { return H - pad - (y - minY) * scale - ((H - pad * 2) - rangeY * scale) / 2 }

  let html = ''

  // Edges
  for (const key in pairs) {
    const [a, b] = key.split('|')
    if (!positions[a] || !positions[b]) continue
    const mean = trimmedMean(pairs[key].rssi)
    if (mean === null) continue
    const x1 = tx(positions[a].x), y1 = ty(positions[a].y)
    const x2 = tx(positions[b].x), y2 = ty(positions[b].y)
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2
    html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`
    html += `<text x="${mx}" y="${my - 6}" text-anchor="middle" fill="#444" font-size="11" font-family="SF Mono,monospace">${Math.round(mean)} dBm</text>`
  }

  // Nodes
  for (const pub of pubs) {
    const pos = positions[pub]
    const cx = tx(pos.x), cy = ty(pos.y)
    const col = pubColor(pub)
    html += `<circle cx="${cx}" cy="${cy}" r="6" fill="${col}"/>`
    html += `<text x="${cx}" y="${cy - 16}" text-anchor="middle" fill="${col}" font-size="14" font-family="SF Mono,monospace">${pub.slice(0, 8)}</text>`
    html += `<text x="${cx}" y="${cy + 22}" text-anchor="middle" fill="#555" font-size="10" font-family="SF Mono,monospace">${pub.slice(0, 8)}…${pub.slice(-6)}</text>`
    if (pos.confidence < 1.0) {
      html += `<text x="${cx}" y="${cy + 36}" text-anchor="middle" fill="#f44" font-size="10" font-family="SF Mono,monospace">LOW CONFIDENCE</text>`
    }
  }

  svg.innerHTML = html
}

function connect() {
  const ws = new WebSocket(API.replace(/^http/, 'ws'))
  ws.onopen = () => { statusEl.textContent = '● live'; statusEl.className = 'live' }
  ws.onclose = () => {
    statusEl.textContent = 'disconnected — reconnecting...'
    statusEl.className = ''
    setTimeout(connect, 3000)
  }
  ws.onerror = () => ws.close()
  ws.onmessage = (e) => {
    let att
    try { att = JSON.parse(e.data) } catch { return }
    const key = [att.observer, att.peer].sort().join('|')
    if (!pairs[key]) pairs[key] = { rssi: [], lastSeen: 0 }
    pairs[key].rssi.push(att.value)
    if (pairs[key].rssi.length > 30) pairs[key].rssi.shift()
    pairs[key].lastSeen = Date.now()
    recompute()
    render()
  }
}

window.addEventListener('resize', render)
connect()
</script>
</body>
</html>
