<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LOCATE1 — Map + Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: row; }
  #map-pane { flex: 1; display: flex; flex-direction: column; }
  #map-pane svg { flex: 1; width: 100%; }
  #feed-pane { width: 480px; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
  #feed { flex: 1; overflow-y: auto; padding: 16px 20px; }
  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .e { padding: 4px 0; border-bottom: 1px solid #111; line-height: 1.6; white-space: nowrap; }
  .t { color: #666; }
  .a { color: #444; }
  .v { color: #ff0; }
  .x a { color: #444; text-decoration: none; }
  .x a:hover { color: #0f0; }
  #status { padding: 10px 20px; border-top: 1px solid #1a1a1a; color: #444; font-size: 11px; }
  #status.live { color: #0f0; }
</style>
</head>
<body>
<div id="map-pane"><svg id="map"></svg></div>
<div id="feed-pane">
  <div id="feed"></div>
  <div id="status">connecting...</div>
</div>
<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3011' : 'https://locate1.axiemaid.com'
const svg = document.getElementById('map')
const feed = document.getElementById('feed')
const statusEl = document.getElementById('status')

const NODE_LABELS = {
  '0303339885d442d21a9642057315827d02275da49e53e36c5882038a8010f06023': 'Node A',
  '03a00f7cad1d90d958d9173d09af24d4f6458e7ea97253d77ca7cf6603d9a1f5ad': 'Node B',
  '0219e01ef3e945e3cfe6ad6516059ef5454e12ca72454d2f67c6346202f77f9a7f': 'Node C',
}

const STALE_MS = 300000

const pairs = {}
const positions = {}

// --- Shared ---

const NODE_PALETTE = [
  '#00ffcc', // cyan/teal
  '#ff3388', // hot pink
  '#7744ff', // purple
  '#ff8800', // orange
  '#00ff44', // green
  '#ff4444', // red
  '#44bbff', // sky blue
]
const pubColorMap = {}
let nextColor = 0
function pubColor(pub) {
  if (!pubColorMap[pub]) {
    pubColorMap[pub] = NODE_PALETTE[nextColor % NODE_PALETTE.length]
    nextColor++
  }
  return pubColorMap[pub]
}

// --- Feed ---

function addFeedEntry(att) {
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false })
  const d = document.createElement('div')
  d.className = 'e'
  d.innerHTML = `<span class="t">${ts}</span> <span style="color:${pubColor(att.observer)}">${att.observer.slice(0,8)}</span><span class="a"> → </span><span style="color:${pubColor(att.peer)}">${att.peer.slice(0,8)}</span> <span class="v">${att.method} ${att.value}</span> <span class="x"><a href="https://whatsonchain.com/tx/${att.txid}" target="_blank">${att.txid.slice(0,10)}…</a></span>`
  feed.insertBefore(d, feed.firstChild)
  while (feed.children.length > 200) feed.removeChild(feed.lastChild)
}

// --- Map: math ---

function trimmedMean(vals) {
  if (!vals.length) return null
  if (vals.length < 5) return vals.reduce((a, b) => a + b, 0) / vals.length
  const s = [...vals].sort((a, b) => a - b)
  const t = Math.floor(s.length * 0.1)
  const tr = s.slice(t, s.length - t)
  return tr.reduce((a, b) => a + b, 0) / tr.length
}

function isStale(pub) {
  const now = Date.now()
  for (const key in pairs) {
    if (!key.includes(pub)) continue
    if (now - pairs[key].lastSeen < STALE_MS) return false
  }
  return true
}

// --- Map: positioning (iterative stress MDS) ---

function recompute() {
  // Build dissimilarity map from pairs
  const dissim = {}
  const pubSet = new Set()
  for (const key in pairs) {
    const mean = trimmedMean(pairs[key].rssi)
    if (mean === null) continue
    dissim[key] = Math.abs(mean)
    const [a, b] = key.split('|')
    pubSet.add(a)
    pubSet.add(b)
  }

  const pubs = [...pubSet]
  if (pubs.length < 2) return

  // Build pair list with target dissimilarities
  const pairList = []
  for (const key in dissim) {
    const [a, b] = key.split('|')
    const ai = pubs.indexOf(a), bi = pubs.indexOf(b)
    pairList.push({ ai, bi, target: dissim[key] })
  }

  const n = pubs.length

  // Seed from previous positions; circular fallback for new nodes
  const coords = new Array(n)
  for (let i = 0; i < n; i++) {
    const prev = positions[pubs[i]]
    if (prev) {
      coords[i] = { x: prev.x, y: prev.y }
    } else {
      coords[i] = { x: Math.cos(2 * Math.PI * i / n) * 50, y: Math.sin(2 * Math.PI * i / n) * 50 }
    }
  }

  // Iterative stress minimization — 500 iterations
  for (let iter = 0; iter < 500; iter++) {
    const lr = 0.05 / (1 + iter * 0.005)
    for (const { ai, bi, target } of pairList) {
      const dx = coords[ai].x - coords[bi].x
      const dy = coords[ai].y - coords[bi].y
      const curr = Math.sqrt(dx * dx + dy * dy) || 0.001
      const err = (curr - target) / curr
      const mx = dx * err * lr
      const my = dy * err * lr
      coords[ai].x -= mx
      coords[ai].y -= my
      coords[bi].x += mx
      coords[bi].y += my
    }
  }

  for (const k in positions) delete positions[k]
  for (let i = 0; i < n; i++) {
    positions[pubs[i]] = { x: coords[i].x, y: coords[i].y }
  }
}

// --- Map: render ---

function renderMap() {
  const pubs = Object.keys(positions)
  const W = svg.clientWidth || svg.parentElement.clientWidth
  const H = svg.clientHeight || svg.parentElement.clientHeight

  if (!pubs.length) {
    svg.innerHTML = `<text x="${W / 2}" y="${H / 2}" text-anchor="middle" fill="#444" font-size="14" font-family="SF Mono,monospace">waiting for attestations...</text>`
    return
  }

  const pad = 100
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity
  for (const p of pubs) {
    const pos = positions[p]
    if (pos.x < minX) minX = pos.x
    if (pos.x > maxX) maxX = pos.x
    if (pos.y < minY) minY = pos.y
    if (pos.y > maxY) maxY = pos.y
  }

  const rangeX = maxX - minX || 1
  const rangeY = maxY - minY || 1
  const scale = Math.min((W - pad * 2) / rangeX, (H - pad * 2) / rangeY)

  function tx(x) { return pad + (x - minX) * scale + ((W - pad * 2) - rangeX * scale) / 2 }
  function ty(y) { return H - pad - (y - minY) * scale - ((H - pad * 2) - rangeY * scale) / 2 }

  let html = ''

  // Edges
  for (const key in pairs) {
    const [a, b] = key.split('|')
    if (!positions[a] || !positions[b]) continue
    const mean = trimmedMean(pairs[key].rssi)
    if (mean === null) continue
    const stale = Date.now() - pairs[key].lastSeen > STALE_MS
    const x1 = tx(positions[a].x), y1 = ty(positions[a].y)
    const x2 = tx(positions[b].x), y2 = ty(positions[b].y)
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2
    const edgeAlpha = stale ? 0.05 : 0.15
    html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,${edgeAlpha})" stroke-width="1"/>`
    html += `<text x="${mx}" y="${my - 6}" text-anchor="middle" fill="${stale ? '#2a2a2a' : '#444'}" font-size="11" font-family="SF Mono,monospace">${Math.round(mean)} dBm</text>`
  }

  // Nodes
  for (const pub of pubs) {
    const pos = positions[pub]
    const stale = isStale(pub)
    const cx = tx(pos.x), cy = ty(pos.y)
    const col = pubColor(pub)
    const opacity = stale ? 0.3 : 1.0

    html += `<circle cx="${cx}" cy="${cy}" r="6" fill="${col}" opacity="${opacity}"/>`
    html += `<text x="${cx}" y="${cy - 16}" text-anchor="middle" fill="${col}" font-size="14" font-family="SF Mono,monospace" opacity="${opacity}">${NODE_LABELS[pub] || pub.slice(0, 8)}</text>`
    html += `<text x="${cx}" y="${cy + 22}" text-anchor="middle" fill="#555" font-size="10" font-family="SF Mono,monospace" opacity="${opacity}">${pub.slice(0, 8)}…${pub.slice(-6)}</text>`
    if (stale) {
      html += `<text x="${cx}" y="${cy + 36}" text-anchor="middle" fill="#666" font-size="10" font-family="SF Mono,monospace">stale</text>`
    }
  }

  svg.innerHTML = html
}

// --- WebSocket ---

let msgCount = 0
function connect() {
  const ws = new WebSocket(API.replace(/^http/, 'ws'))
  ws.onopen = () => { statusEl.textContent = '● live'; statusEl.className = 'live' }
  ws.onclose = () => {
    statusEl.textContent = 'disconnected — reconnecting...'
    statusEl.className = ''
    setTimeout(connect, 3000)
  }
  ws.onerror = () => ws.close()
  ws.onmessage = (e) => {
    let att
    try { att = JSON.parse(e.data) } catch { return }

    // Feed
    addFeedEntry(att)
    statusEl.textContent = '● live — ' + (++msgCount) + ' msgs'
    statusEl.className = 'live'

    // Map
    const key = [att.observer, att.peer].sort().join('|')
    if (!pairs[key]) pairs[key] = { rssi: [], lastSeen: 0 }
    pairs[key].rssi.push(att.value)
    if (pairs[key].rssi.length > 10) pairs[key].rssi.shift()
    pairs[key].lastSeen = Date.now()
    recompute()
    renderMap()
  }
}

window.addEventListener('resize', renderMap)
renderMap()
connect()
</script>
</body>
</html>
