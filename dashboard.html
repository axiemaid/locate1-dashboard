<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LOCATE1 — Live Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }
  #feed { flex: 1; overflow-y: auto; padding: 16px 20px; }
  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .e { padding: 4px 0; border-bottom: 1px solid #111; line-height: 1.6; }
  .t { color: #666; }
  .o { color: #0ff; }
  .a { color: #444; }
  .p { color: #f0f; }
  .v { color: #ff0; }
  .x a { color: #444; text-decoration: none; }
  .x a:hover { color: #0f0; }
  #status { padding: 10px 20px; border-top: 1px solid #1a1a1a; color: #444; font-size: 11px; }
  #status.live { color: #0f0; }
</style>
</head>
<body>
<div id="feed"></div>
<div id="status">connecting...</div>
<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3011' : 'https://locate1.axiemaid.com'
const feed = document.getElementById('feed')
const status = document.getElementById('status')

function add(att) {
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false })
  const d = document.createElement('div')
  d.className = 'e'
  d.innerHTML = `<span class="t">${ts}</span> <span class="o">${att.observer.slice(0,8)}</span><span class="a"> → </span><span class="p">${att.peer.slice(0,8)}</span> <span class="v">${att.method} ${att.value}</span> <span class="x"><a href="https://whatsonchain.com/tx/${att.txid}" target="_blank">${att.txid.slice(0,10)}…</a></span>`
  feed.insertBefore(d, feed.firstChild)
  while (feed.children.length > 200) feed.removeChild(feed.lastChild)
}

let msgCount = 0
function connect() {
  const ws = new WebSocket(API.replace(/^http/, 'ws'))
  ws.onopen = () => { status.textContent = '● live'; status.className = 'live' }
  ws.onmessage = e => { status.textContent = '● live — ' + (++msgCount) + ' msgs'; try { add(JSON.parse(e.data)) } catch (err) { console.error('WS:', err) } }
  ws.onclose = () => { status.textContent = 'disconnected — reconnecting...'; status.className = ''; setTimeout(connect, 3000) }
  ws.onerror = () => ws.close()
}
connect()
</script>
</body>
</html>
